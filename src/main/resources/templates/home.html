<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>ComicHub - Inicio</title>

<style>
body {
	margin: 0;
	font-family: Arial, Helvetica, sans-serif;
	background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
	color: white;
}

/* NAVBAR */
.navbar {
	display: flex;
	align-items: center;
	justify-content: space-between;
	padding: 15px 40px;
	background-color: #111827;
}

.logo {
	font-size: 22px;
	font-weight: bold;
	color: orange;
}

.menu a {
	color: white;
	text-decoration: none;
	margin: 0 15px;
	font-size: 16px;
}

.menu a:hover {
	color: orange;
}

/* BANNER PRINCIPAL */
.banner {
	display: flex;
	gap: 20px;
	padding: 40px;
}

.banner img {
	width: 100%;
	border-radius: 10px;
}

.banner-left {
	flex: 2;
}

.banner-right {
	flex: 1;
	display: flex;
	flex-direction: column;
	gap: 20px;
}

/* SECCIÓN POPULAR */
.section {
	padding: 40px;
}

.section h2 {
	margin-bottom: 20px;
}

.cards {
	display: flex;
	gap: 20px;
}

.card {
	width: 180px;
}

.card img {
	width: 100%;
	border-radius: 10px;
	transition: transform 0.3s;
}

.card img:hover {
	transform: scale(1.05);
}
</style>
</head>

<body>

	<!-- NAVBAR -->
	<div class="navbar">
		<div class="logo">ComicHub</div>

		<div class="menu">
			<a href="#">Inicio</a> <a href="#">Series</a> <a href="#">Rankings</a>
			<a href="#">Capítulos</a>
		</div>
	</div>

	<!-- BANNERS -->
	<div class="banner">
		<div class="banner-left">
			<img src="https://picsum.photos/800/350?random=1">
		</div>

		<div class="banner-right">
			<img src="https://picsum.photos/400/160?random=2"> <img
				src="https://picsum.photos/400/160?random=3">
		</div>
	</div>

	<!-- POPULAR DEL DÍA -->
	<div class="section">
		<h2>Popular del Día</h2>

		<div class="cards">
			<div class="card">
				<img src="https://picsum.photos/200/300?random=4">
			</div>
			<div class="card">
				<img src="https://picsum.photos/200/300?random=5">
			</div>
			<div class="card">
				<img src="https://picsum.photos/200/300?random=6">
			</div>
			<div class="card">
				<img src="https://picsum.photos/200/300?random=7">
			</div>
			<div class="card">
				<img src="https://picsum.photos/200/300?random=8">
			</div>
		</div>
	</div>

</body>
</html>
