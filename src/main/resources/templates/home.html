<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ComicHub - Inicio</title>
<link rel="icon" type="image/png" th:href="@{/img/icon.png}">

<style>
body {
	margin: 0;
	font-family: Arial, Helvetica, sans-serif;
	background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
	color: white;
}

/* NAVBAR */
.navbar {
	display: flex;
	align-items: center;
	justify-content: space-between;
	padding: 12px 40px;
	background: linear-gradient(90deg, #0f1f3a 0%, #121f39 55%, #101b32 100%);
	border-bottom: 1px solid rgba(255, 255, 255, 0.08);
}

.nav-left {
	display: flex;
	align-items: center;
	gap: 24px;
}

.logo-img {
	width: 62px;
	height: 62px;
	object-fit: contain;
	filter: drop-shadow(0 4px 10px rgba(0, 0, 0, 0.4));
}

.menu {
	display: flex;
	align-items: center;
	gap: 10px;
}

.menu a {
	color: white;
	text-decoration: none;
	padding: 9px 14px;
	border-radius: 10px;
	font-size: 18px;
	transition: 0.25s;
}

.menu a:hover {
	background: rgba(255, 255, 255, 0.08);
}

.menu a.active {
	background: rgba(246, 157, 17, 0.22);
	color: #ffb326;
	font-weight: bold;
}

.menu-icon {
	margin-right: 6px;
}

.nav-right {
	display: flex;
	align-items: center;
	gap: 16px;
}

.nav-icon {
	width: 34px;
	height: 34px;
	display: inline-flex;
	align-items: center;
	justify-content: center;
	color: #f8fafc;
	border-radius: 999px;
	transition: 0.2s;
}

.nav-icon:hover {
	background: rgba(255, 255, 255, 0.12);
}

/* BANNER PRINCIPAL */
.banner {
	display: flex;
	gap: 20px;
	padding: 40px;
}

.banner img {
	width: 100%;
	border-radius: 10px;
}

.banner-left {
	flex: 2;
}

.banner-right {
	flex: 1;
	display: flex;
	flex-direction: column;
	gap: 20px;
}

/* SECCIÓN POPULAR */
.section {
	padding: 40px;
}

.section h2 {
	margin-bottom: 20px;
}

.cards {
	display: flex;
	gap: 20px;
}

.card {
	width: 180px;
}

.card img {
	width: 100%;
	border-radius: 10px;
	transition: transform 0.3s;
}

.card img:hover {
	transform: scale(1.05);
}
</style>
</head>

<body>

	<!-- NAVBAR -->
	<div class="navbar">
		<div class="nav-left">
			<img th:src="@{/img/logo.png}" src="/img/logo.png" alt="ComicHub" class="logo-img">
			<div class="menu">
				<a href="#" class="active"><span class="menu-icon">⌂</span>Inicio</a>
				<a href="#">Series</a>
				<a href="#">Rankings</a>
				<a href="#">Capítulos</a>
			</div>
		</div>
		<div class="nav-right">
			<span class="nav-icon" title="Buscar">⌕</span>
			<span class="nav-icon" title="Perfil">◯</span>
		</div>
	</div>

	<!-- BANNERS -->
	<div class="banner">
		<div class="banner-left">
			<img src="https://picsum.photos/800/350?random=1">
		</div>

		<div class="banner-right">
			<img src="https://picsum.photos/400/160?random=2"> <img
				src="https://picsum.photos/400/160?random=3">
		</div>
	</div>

	<!-- POPULAR DEL DÍA -->
	<div class="section">
		<h2>Popular del Día</h2>

		<div class="cards">
			<div class="card">
				<img src="https://picsum.photos/200/300?random=4">
			</div>
			<div class="card">
				<img src="https://picsum.photos/200/300?random=5">
			</div>
			<div class="card">
				<img src="https://picsum.photos/200/300?random=6">
			</div>
			<div class="card">
				<img src="https://picsum.photos/200/300?random=7">
			</div>
			<div class="card">
				<img src="https://picsum.photos/200/300?random=8">
			</div>
		</div>
	</div>

</body>
</html>
