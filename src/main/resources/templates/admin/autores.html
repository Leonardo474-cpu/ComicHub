<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/components/layout :: layout('Autores - Admin', 'Autores', 'Gestiona autores del catalogo.', 'autores', ~{::section})}">
<section>
    <p th:if="${success}" th:text="${success}"
       class="mb-4 rounded-xl border border-emerald-400/40 bg-emerald-500/10 px-4 py-3 text-sm text-emerald-200"></p>

    <div class="mb-5 flex items-center justify-end">
        <a th:href="@{/admin/autores/nuevo}"
           class="rounded-xl bg-emerald-500 px-4 py-2.5 text-sm font-semibold text-slate-950 transition hover:bg-emerald-400">
            Agregar nuevo autor
        </a>
    </div>

    <div class="overflow-hidden rounded-2xl border border-white/10 bg-slate-900/60 shadow-2xl shadow-slate-950/40">
        <div class="overflow-x-auto">
            <table class="min-w-full divide-y divide-slate-800 text-sm">
                <thead class="bg-slate-900/80 text-left text-xs uppercase tracking-wider text-slate-400">
                <tr>
                    <th class="px-5 py-4 font-semibold">ID</th>
                    <th class="px-5 py-4 font-semibold">Nombre</th>
                    <th class="px-5 py-4 font-semibold">Seudonimo</th>
                    <th class="px-5 py-4 font-semibold">Estado</th>
                    <th class="px-5 py-4 text-center font-semibold">Acciones</th>
                </tr>
                </thead>
                <tbody class="divide-y divide-slate-800 text-slate-200">
                <tr th:each="a : ${autores}" class="hover:bg-slate-800/50 transition">
                    <td class="whitespace-nowrap px-5 py-4" th:text="${a.idAutor}"></td>
                    <td class="whitespace-nowrap px-5 py-4 font-semibold" th:text="${a.nombre}"></td>
                    <td class="whitespace-nowrap px-5 py-4"
                        th:text="${a.seudonimo != null and !#strings.isEmpty(a.seudonimo) ? a.seudonimo : '-'}"></td>
                    <td class="whitespace-nowrap px-5 py-4">
                        <span th:if="${a.activo}"
                              class="inline-flex rounded-full border border-emerald-400/40 bg-emerald-500/10 px-2.5 py-1 text-xs font-semibold text-emerald-200">
                            Activo
                        </span>
                        <span th:if="${!a.activo}"
                              class="inline-flex rounded-full border border-rose-400/40 bg-rose-500/10 px-2.5 py-1 text-xs font-semibold text-rose-200">
                            Desactivado
                        </span>
                    </td>
                    <td class="whitespace-nowrap px-5 py-4">
                        <div class="flex items-center justify-center gap-2">
                            <a th:href="@{/admin/autores/editar/{id}(id=${a.idAutor})}"
                               class="inline-flex h-9 w-9 items-center justify-center rounded-lg bg-cyan-500 text-slate-950 transition hover:bg-cyan-400"
                               title="Editar autor"
                               aria-label="Editar autor">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zm17.71-10.04a1.003 1.003 0 000-1.42l-2.5-2.5a1.003 1.003 0 00-1.42 0l-1.83 1.83 3.75 3.75 2-1.66z"/>
                                </svg>
                            </a>

                            <button type="button"
                                    th:attr="data-id=${a.idAutor},data-nombre=${a.nombre},data-activo=${a.activo}"
                                    onclick="abrirModalEstadoAutor(this)"
                                    th:classappend="${a.activo} ? ' border-rose-400/50 bg-rose-500/10 text-rose-200 hover:bg-rose-500/20' : ' border-emerald-400/40 bg-emerald-500/10 text-emerald-200 hover:bg-emerald-500/20'"
                                    class="inline-flex h-9 w-9 items-center justify-center rounded-lg border transition"
                                    th:title="${a.activo} ? 'Desactivar autor' : 'Activar autor'"
                                    th:aria-label="${a.activo} ? 'Desactivar autor' : 'Activar autor'">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v9m6.36-6.36a9 9 0 1 1-12.72 0"/>
                                </svg>
                            </button>
                        </div>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(autores)}">
                    <td colspan="5" class="px-5 py-10 text-center text-slate-400">No hay autores registrados.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div id="modalEstadoAutor" class="fixed inset-0 z-50 hidden items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-950/80 backdrop-blur-sm" onclick="cerrarModalEstadoAutor()"></div>
        <div id="modalEstadoAutorPanel" class="relative w-full max-w-md rounded-2xl border bg-slate-900 p-6 shadow-2xl shadow-slate-950/60">
            <h3 id="modalEstadoAutorTitulo" class="text-lg font-semibold text-white"></h3>
            <p class="mt-2 text-sm text-slate-300">
                ¿Desea <span id="modalEstadoAutorMensajeAccion"></span> al autor
                <span id="autorModalNombre" class="font-semibold"></span>?
            </p>
            <div class="mt-6 flex items-center justify-end gap-3">
                <button type="button"
                        onclick="cerrarModalEstadoAutor()"
                        class="rounded-xl border border-slate-700 px-4 py-2 text-sm font-semibold text-slate-200 transition hover:border-slate-500 hover:bg-slate-800">
                    Cancelar
                </button>
                <a id="btnConfirmarEstadoAutor"
                   href="#"
                   class="rounded-xl px-4 py-2 text-sm font-semibold text-white transition">
                </a>
            </div>
        </div>
    </div>

    <script>
        const modalEstadoAutor = document.getElementById('modalEstadoAutor');
        const modalEstadoAutorPanel = document.getElementById('modalEstadoAutorPanel');
        const modalEstadoAutorTitulo = document.getElementById('modalEstadoAutorTitulo');
        const modalEstadoAutorMensajeAccion = document.getElementById('modalEstadoAutorMensajeAccion');
        const autorModalNombre = document.getElementById('autorModalNombre');
        const btnConfirmarEstadoAutor = document.getElementById('btnConfirmarEstadoAutor');

        function abrirModalEstadoAutor(button) {
            const id = button.dataset.id;
            const nombre = button.dataset.nombre || 'este autor';
            const activo = button.dataset.activo === 'true';
            const accion = activo ? 'Desactivar' : 'Activar';

            modalEstadoAutorTitulo.textContent = accion + ' autor';
            modalEstadoAutorMensajeAccion.textContent = activo ? 'desactivar' : 'activar';
            autorModalNombre.textContent = nombre;

            if (activo) {
                autorModalNombre.className = 'font-semibold text-rose-200';
                modalEstadoAutorPanel.className = 'relative w-full max-w-md rounded-2xl border border-rose-400/30 bg-slate-900 p-6 shadow-2xl shadow-slate-950/60';
                btnConfirmarEstadoAutor.className = 'rounded-xl bg-rose-500 px-4 py-2 text-sm font-semibold text-white transition hover:bg-rose-400';
                btnConfirmarEstadoAutor.textContent = 'Confirmar desactivacion';
            } else {
                autorModalNombre.className = 'font-semibold text-emerald-200';
                modalEstadoAutorPanel.className = 'relative w-full max-w-md rounded-2xl border border-emerald-400/30 bg-slate-900 p-6 shadow-2xl shadow-slate-950/60';
                btnConfirmarEstadoAutor.className = 'rounded-xl bg-emerald-500 px-4 py-2 text-sm font-semibold text-slate-950 transition hover:bg-emerald-400';
                btnConfirmarEstadoAutor.textContent = 'Confirmar activacion';
            }

            btnConfirmarEstadoAutor.href = '/admin/autores/estado/' + id;
            modalEstadoAutor.classList.remove('hidden');
            modalEstadoAutor.classList.add('flex');
        }

        function cerrarModalEstadoAutor() {
            modalEstadoAutor.classList.remove('flex');
            modalEstadoAutor.classList.add('hidden');
        }
    </script>
    <script th:inline="javascript">
        const paramsAutores = new URLSearchParams(window.location.search);
        if (paramsAutores.get('estadoActualizado') === 'true') {
            const toast = document.createElement('div');
            toast.className = 'fixed bottom-6 right-6 z-50 rounded-xl border border-emerald-400/40 bg-emerald-500/15 px-4 py-3 text-sm font-semibold text-emerald-200 shadow-2xl shadow-slate-950/50';
            toast.textContent = 'Estado de autor actualizado correctamente.';
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2600);
        }
    </script>
</section>
</html>
