<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/components/layout :: layout('Detalle de Comic - Admin', 'Detalle de Comic', 'Visualiza la informacion completa del comic.', 'comics', ~{::section})}">
<section>
    <div class="mx-auto max-w-4xl rounded-2xl border border-white/10 bg-slate-900/60 p-6 shadow-2xl shadow-slate-950/40 sm:p-8">
        <div class="grid gap-6 md:grid-cols-3">
            <div class="md:col-span-1">
                <img th:if="${comic.rutaImagenPortada != null and !#strings.isEmpty(comic.rutaImagenPortada)}"
                     th:src="${comic.rutaImagenPortada}"
                     alt="Portada comic"
                     class="h-72 w-full rounded-xl border border-white/10 object-cover">
                <div th:if="${comic.rutaImagenPortada == null or #strings.isEmpty(comic.rutaImagenPortada)}"
                     class="flex h-72 w-full items-center justify-center rounded-xl border border-dashed border-slate-700 text-sm text-slate-400">
                    Sin portada registrada
                </div>
            </div>

            <div class="space-y-4 md:col-span-2">
                <div>
                    <p class="text-xs uppercase tracking-wider text-slate-400">Titulo</p>
                    <h2 class="mt-1 text-2xl font-bold text-white" th:text="${comic.titulo}"></h2>
                </div>

                <div class="grid gap-4 sm:grid-cols-2">
                    <div>
                        <p class="text-xs uppercase tracking-wider text-slate-400">Autor</p>
                        <p class="mt-1 text-sm text-slate-100" th:text="${comic.autor != null ? comic.autor.nombre : '-'}"></p>
                    </div>
                    <div>
                        <p class="text-xs uppercase tracking-wider text-slate-400">Categoria</p>
                        <p class="mt-1 text-sm text-slate-100" th:text="${comic.categoria != null ? comic.categoria.descripcion : '-'}"></p>
                    </div>
                    <div>
                        <p class="text-xs uppercase tracking-wider text-slate-400">Estado editorial</p>
                        <p class="mt-1 text-sm text-slate-100" th:text="${comic.estado != null ? #strings.replace(comic.estado.name(), '_', ' ') : '-'}"></p>
                    </div>
                    <div>
                        <p class="text-xs uppercase tracking-wider text-slate-400">Estado en sistema</p>
                        <p class="mt-1 text-sm" th:classappend="${comic.activo} ? ' text-emerald-300' : ' text-rose-300'"
                           th:text="${comic.activo} ? 'Activo' : 'Desactivado'"></p>
                    </div>
                </div>

                <div>
                    <p class="text-xs uppercase tracking-wider text-slate-400">Sinopsis</p>
                    <p class="mt-1 whitespace-pre-line text-sm text-slate-200"
                       th:text="${comic.sinopsis != null and !#strings.isEmpty(comic.sinopsis) ? comic.sinopsis : 'Sin sinopsis registrada'}"></p>
                </div>
            </div>
        </div>

        <div class="mt-8 flex flex-wrap items-center gap-3">
            <a th:href="@{/admin/comics/editar/{id}(id=${comic.idComic})}"
               class="rounded-xl bg-cyan-500 px-5 py-2.5 text-sm font-semibold text-slate-950 transition hover:bg-cyan-400">
                Editar comic
            </a>
            <a th:href="@{/admin/comics}"
               class="rounded-xl border border-slate-700 px-5 py-2.5 text-sm font-semibold text-slate-200 transition hover:border-slate-500 hover:bg-slate-800">
                Volver al listado
            </a>
            <a th:href="@{/admin/comics/estado/{id}(id=${comic.idComic})}"
               th:classappend="${comic.activo} ? ' bg-rose-500 text-white hover:bg-rose-400' : ' bg-emerald-500 text-slate-950 hover:bg-emerald-400'"
               class="rounded-xl px-5 py-2.5 text-sm font-semibold transition">
                <span th:text="${comic.activo} ? 'Desactivar comic' : 'Activar comic'"></span>
            </a>
        </div>
    </div>
</section>
</html>
