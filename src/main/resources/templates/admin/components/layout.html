<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      th:fragment="layout(pageTitle, pageHeading, pageDescription, activeSection, headerIcon, actionLabel, actionUrl, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">ComicHub Admin</title>
    <link rel="icon" type="image/png" href="/img/icon.png" th:href="@{/img/icon.png}">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-slate-950 text-slate-100">
<div class="flex min-h-screen">
    <aside class="flex w-72 flex-col border-r border-white/10 bg-slate-900/80 backdrop-blur">
        <div class="px-6 py-6">
            <a th:href="@{/admin}" class="text-xl font-bold tracking-wide text-cyan-300">ComicHub Admin</a>
            <p class="mt-1 text-xs text-slate-400">Panel de administracion</p>
        </div>

        <nav class="flex-1 space-y-2 px-4 pb-6">
            <a th:href="@{/admin}"
               class="flex items-center gap-2 rounded-xl px-4 py-3 text-sm font-semibold text-slate-200 transition hover:bg-cyan-500/15 hover:text-cyan-200"
               th:classappend="${activeSection == 'dashboard'} ? ' bg-cyan-500/20 text-cyan-200'">
                Dashboard
            </a>
            <a th:href="@{/admin/usuarios}"
               class="flex items-center gap-2 rounded-xl px-4 py-3 text-sm font-semibold text-slate-200 transition hover:bg-cyan-500/15 hover:text-cyan-200"
               th:classappend="${activeSection == 'usuarios'} ? ' bg-cyan-500/20 text-cyan-200'">
                Usuarios
            </a>
            <a th:href="@{/admin/comics}"
               class="flex items-center gap-2 rounded-xl px-4 py-3 text-sm font-semibold text-slate-200 transition hover:bg-cyan-500/15 hover:text-cyan-200"
               th:classappend="${activeSection == 'comics'} ? ' bg-cyan-500/20 text-cyan-200'">
                Comics
            </a>
            <a th:href="@{/admin/autores}"
               class="flex items-center gap-2 rounded-xl px-4 py-3 text-sm font-semibold text-slate-200 transition hover:bg-cyan-500/15 hover:text-cyan-200"
               th:classappend="${activeSection == 'autores'} ? ' bg-cyan-500/20 text-cyan-200'">
                Autores
            </a>
            <a th:href="@{/admin/categorias}"
               class="flex items-center gap-2 rounded-xl px-4 py-3 text-sm font-semibold text-slate-200 transition hover:bg-cyan-500/15 hover:text-cyan-200"
               th:classappend="${activeSection == 'categorias'} ? ' bg-cyan-500/20 text-cyan-200'">
                Categorias
            </a>
            <a th:href="@{/admin/suscripciones}"
               class="flex items-center gap-2 rounded-xl px-4 py-3 text-sm font-semibold text-slate-200 transition hover:bg-cyan-500/15 hover:text-cyan-200"
               th:classappend="${activeSection == 'suscripciones'} ? ' bg-cyan-500/20 text-cyan-200'">
                Suscripciones
            </a>
        </nav>

        <div class="mt-auto px-4 pb-6">
            <a th:href="@{/logout}"
               class="flex items-center justify-center gap-2 rounded-xl border border-rose-400/40 bg-rose-500/10 px-4 py-3 text-sm font-semibold text-rose-200 transition hover:bg-rose-500/20">
                Cerrar sesion
            </a>
        </div>
    </aside>

    <main class="flex-1 px-6 py-8 sm:px-10">
        <header class="mb-8 rounded-2xl border border-white/10 bg-gradient-to-r from-slate-900/90 to-slate-800/70 p-5 shadow-xl shadow-slate-950/30">
            <div class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
                <div>
                    <h1 class="text-2xl font-semibold tracking-tight sm:text-3xl" th:text="${pageHeading}">Panel</h1>
                    <p class="mt-1 text-sm text-slate-400" th:text="${pageDescription}">Administracion</p>
                </div>

                <a th:if="${actionLabel != null and actionUrl != null}"
                   th:href="${actionUrl}"
                   class="inline-flex items-center justify-center rounded-xl bg-emerald-500 px-4 py-2.5 text-sm font-semibold text-slate-950 transition hover:bg-emerald-400"
                   th:text="${actionLabel}">
                    Agregar
                </a>
            </div>
        </header>

        <section th:replace="${content}"></section>
    </main>
</div>
</body>
</html>
