<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      th:fragment="layout(pageTitle, pageHeading, pageDescription, activeSection, headerIcon, reportLabel, reportUrl, actionLabel, actionUrl, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">ComicHub Admin</title>
    <link rel="icon" type="image/png" href="/img/icon.png" th:href="@{/img/icon.png}">
    <link rel="shortcut icon" href="/favicon.ico" th:href="@{/favicon.ico}">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="h-screen overflow-hidden bg-slate-950 text-slate-100">
<div class="flex h-screen">
    <aside class="sticky top-0 flex h-screen w-72 shrink-0 flex-col border-r border-white/10 bg-slate-900/80 backdrop-blur">
        <div class="px-6 py-6">
            <a th:href="@{/admin}" class="inline-flex items-center gap-2 text-xl font-bold tracking-wide text-cyan-300">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
                </svg>
                ComicHub Admin
            </a>
            <p class="mt-1 text-xs text-slate-400">Panel de administracion</p>
        </div>

        <nav class="flex-1 space-y-2 overflow-y-auto px-4 pb-6">
            <a th:href="@{/admin}"
               class="flex items-center gap-2 rounded-xl px-4 py-3 text-sm font-semibold text-slate-200 transition hover:bg-cyan-500/15 hover:text-cyan-200"
               th:classappend="${activeSection == 'dashboard'} ? ' bg-cyan-500/20 text-cyan-200'">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3 13h8V3H3zM13 21h8V11h-8zM13 3h8v4h-8zM3 21h8v-4H3z"/>
                </svg>
                Dashboard
            </a>
            <a th:href="@{/admin/usuarios}"
               class="flex items-center gap-2 rounded-xl px-4 py-3 text-sm font-semibold text-slate-200 transition hover:bg-cyan-500/15 hover:text-cyan-200"
               th:classappend="${activeSection == 'usuarios'} ? ' bg-cyan-500/20 text-cyan-200'">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                    <circle cx="8.5" cy="7" r="4"/>
                    <path stroke-linecap="round" stroke-linejoin="round" d="M20 8v6M23 11h-6"/>
                </svg>
                Usuarios
            </a>
            <a th:href="@{/admin/comics}"
               class="flex items-center gap-2 rounded-xl px-4 py-3 text-sm font-semibold text-slate-200 transition hover:bg-cyan-500/15 hover:text-cyan-200"
               th:classappend="${activeSection == 'comics'} ? ' bg-cyan-500/20 text-cyan-200'">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
                </svg>
                Comics
            </a>
            <a th:href="@{/admin/autores}"
               class="flex items-center gap-2 rounded-xl px-4 py-3 text-sm font-semibold text-slate-200 transition hover:bg-cyan-500/15 hover:text-cyan-200"
               th:classappend="${activeSection == 'autores'} ? ' bg-cyan-500/20 text-cyan-200'">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="7" r="4"/>
                    <path stroke-linecap="round" stroke-linejoin="round" d="M5.5 21a6.5 6.5 0 0 1 13 0"/>
                </svg>
                Autores
            </a>
            <a th:href="@{/admin/categorias}"
               class="flex items-center gap-2 rounded-xl px-4 py-3 text-sm font-semibold text-slate-200 transition hover:bg-cyan-500/15 hover:text-cyan-200"
               th:classappend="${activeSection == 'categorias'} ? ' bg-cyan-500/20 text-cyan-200'">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3 7l9-4 9 4-9 4-9-4z"/>
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3 17l9 4 9-4"/>
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l9 4 9-4"/>
                </svg>
                Categorias
            </a>
            <a th:href="@{/admin/suscripciones}"
               class="flex items-center gap-2 rounded-xl px-4 py-3 text-sm font-semibold text-slate-200 transition hover:bg-cyan-500/15 hover:text-cyan-200"
               th:classappend="${activeSection == 'suscripciones'} ? ' bg-cyan-500/20 text-cyan-200'">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="2" y="5" width="20" height="14" rx="2"/>
                    <path stroke-linecap="round" stroke-linejoin="round" d="M2 10h20"/>
                </svg>
                Suscripciones
            </a>
        </nav>

        <div class="mt-auto px-4 pb-6">
            <a th:href="@{/logout}"
               class="flex items-center justify-center gap-2 rounded-xl border border-rose-400/40 bg-rose-500/10 px-4 py-3 text-sm font-semibold text-rose-200 transition hover:bg-rose-500/20">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                    <path stroke-linecap="round" stroke-linejoin="round" d="M16 17l5-5-5-5"/>
                    <path stroke-linecap="round" stroke-linejoin="round" d="M21 12H9"/>
                </svg>
                Cerrar sesion
            </a>
        </div>
    </aside>

    <main class="flex-1 overflow-y-auto px-6 py-8 sm:px-10">
        <header class="mb-8 rounded-2xl border border-white/10 bg-gradient-to-r from-slate-900/90 to-slate-800/70 p-5 shadow-xl shadow-slate-950/30">
            <div class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
                <div class="flex items-start gap-3">
                    <div class="inline-flex h-12 w-12 items-center justify-center rounded-xl border border-cyan-400/30 bg-cyan-500/10 text-cyan-200">
                        <th:block th:switch="${headerIcon}">
                            <svg th:case="'dashboard'" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M3 13h8V3H3zM13 21h8V11h-8zM13 3h8v4h-8zM3 21h8v-4H3z"/>
                            </svg>
                            <svg th:case="'usuarios'" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                                <circle cx="8.5" cy="7" r="4"/>
                                <path stroke-linecap="round" stroke-linejoin="round" d="M20 8v6M23 11h-6"/>
                            </svg>
                            <svg th:case="'comics'" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                                <path stroke-linecap="round" stroke-linejoin="round" d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
                            </svg>
                            <svg th:case="'autores'" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="7" r="4"/>
                                <path stroke-linecap="round" stroke-linejoin="round" d="M5.5 21a6.5 6.5 0 0 1 13 0"/>
                            </svg>
                            <svg th:case="'categorias'" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M3 7l9-4 9 4-9 4-9-4z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" d="M3 17l9 4 9-4"/>
                                <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l9 4 9-4"/>
                            </svg>
                            <svg th:case="'suscripciones'" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="2" y="5" width="20" height="14" rx="2"/>
                                <path stroke-linecap="round" stroke-linejoin="round" d="M2 10h20"/>
                            </svg>
                            <svg th:case="*" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="10"/>
                                <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4"/>
                                <path stroke-linecap="round" stroke-linejoin="round" d="M12 16h.01"/>
                            </svg>
                        </th:block>
                    </div>
                    <div>
                    <h1 class="text-2xl font-semibold tracking-tight sm:text-3xl" th:text="${pageHeading}">Panel</h1>
                    <p class="mt-1 text-sm text-slate-400" th:text="${pageDescription}">Administracion</p>
                    </div>
                </div>

                <div class="flex flex-wrap items-center gap-2">
                    <a th:if="${reportLabel != null and reportUrl != null}"
                       th:href="${reportUrl}"
                       target="_blank"
                       class="inline-flex items-center justify-center gap-2 rounded-xl border border-emerald-400/40 bg-emerald-500/10 px-4 py-2.5 text-sm font-semibold text-emerald-200 transition hover:bg-emerald-500/20">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                            <path stroke-linecap="round" stroke-linejoin="round" d="M14 2v6h6"/>
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 18v-6"/>
                            <path stroke-linecap="round" stroke-linejoin="round" d="M9 15l3 3 3-3"/>
                        </svg>
                        <span th:text="${reportLabel}">Exportar PDF</span>
                    </a>

                    <a th:if="${actionLabel != null and actionUrl != null}"
                       th:href="${actionUrl}"
                       class="inline-flex items-center justify-center gap-2 rounded-xl bg-emerald-500 px-4 py-2.5 text-sm font-semibold text-slate-950 transition hover:bg-emerald-400">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 5v14M5 12h14"/>
                        </svg>
                        <span th:text="${actionLabel}">Agregar</span>
                    </a>
                </div>
            </div>
        </header>

        <section th:replace="${content}"></section>
    </main>
</div>
</body>
</html>
