<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/components/layout :: layout('Usuarios - Admin', 'Usuarios', 'Gestiona cuentas del sistema.', 'usuarios', 'usuarios', 'Exportar PDF', @{/api/reportes/usuarios(estado=${estadoSeleccionado},q=${busqueda})}, 'Agregar usuario', '/admin/usuarios/nuevo', ~{::section})}">
<section>
    <div class="mb-4 rounded-2xl border border-white/10 bg-slate-900/50 p-4">
        <form method="get" th:action="@{/admin/usuarios}" class="flex flex-col gap-3 xl:flex-row xl:items-end">
            <div class="w-full xl:max-w-2xl">
                <label for="q" class="mb-1 block text-xs font-semibold uppercase tracking-wider text-slate-400">Buscar por nombre</label>
                <input id="q" name="q" type="text" th:value="${busqueda}"
                       placeholder="Ej. Juan Perez"
                       class="w-full rounded-xl border border-slate-700 bg-slate-900 px-3 py-2 text-sm text-slate-100 outline-none ring-cyan-400/40 transition focus:border-cyan-400 focus:ring xl:min-w-[26rem]">
            </div>
            <div class="grid gap-3 sm:grid-cols-2">
                <div>
                    <label for="estado" class="mb-1 block text-xs font-semibold uppercase tracking-wider text-slate-400">Filtrar por estado</label>
                    <select id="estado" name="estado"
                            class="rounded-xl border border-slate-700 bg-slate-900 px-3 py-2 text-sm text-slate-100 outline-none ring-cyan-400/40 transition focus:border-cyan-400 focus:ring">
                        <option value="TODOS" th:selected="${estadoSeleccionado == 'TODOS'}">Todos</option>
                        <option value="ACTIVOS" th:selected="${estadoSeleccionado == 'ACTIVOS'}">Activos</option>
                        <option value="INACTIVOS" th:selected="${estadoSeleccionado == 'INACTIVOS'}">Inactivos</option>
                    </select>
                </div>
            </div>
            <input type="hidden" name="page" value="0">
            <div class="flex items-center gap-2 xl:ml-auto">
                <button type="submit"
                        class="rounded-xl border border-cyan-400/40 bg-cyan-500/10 px-4 py-2 text-sm font-semibold text-cyan-200 transition hover:bg-cyan-500/20">
                    Aplicar filtro
                </button>
            </div>
        </form>
    </div>

    <div class="overflow-hidden rounded-2xl border border-white/10 bg-slate-900/60 shadow-2xl shadow-slate-950/40">
        <div class="overflow-x-auto">
            <table class="min-w-full divide-y divide-slate-800 text-sm">
                <thead class="bg-slate-900/80 text-left text-xs uppercase tracking-wider text-slate-400">
                <tr>
                    <th class="px-5 py-4 font-semibold">ID</th>
                    <th class="px-5 py-4 font-semibold">Nombre</th>
                    <th class="px-5 py-4 font-semibold">Correo</th>
                    <th class="px-5 py-4 font-semibold">Rol</th>
                    <th class="px-5 py-4 font-semibold">Estado</th>
                    <th class="px-5 py-4 text-center font-semibold">Acciones</th>
                </tr>
                </thead>
                <tbody class="divide-y divide-slate-800 text-slate-200">
                <tr th:each="u : ${usuarios}" class="hover:bg-slate-800/50 transition">
                    <td class="whitespace-nowrap px-5 py-4" th:text="${u.id}"></td>
                    <td class="whitespace-nowrap px-5 py-4" th:text="${u.nombreCompleto}"></td>
                    <td class="whitespace-nowrap px-5 py-4" th:text="${u.correo}"></td>
                    <td class="whitespace-nowrap px-5 py-4">
                        <span class="inline-flex rounded-full border border-cyan-400/40 bg-cyan-400/10 px-2.5 py-1 text-xs font-semibold text-cyan-200"
                              th:text="${u.nombreRol}"></span>
                    </td>
                    <td class="whitespace-nowrap px-5 py-4">
                        <span th:if="${u.activo}"
                              class="inline-flex rounded-full border border-emerald-400/40 bg-emerald-500/10 px-2.5 py-1 text-xs font-semibold text-emerald-200">
                            Activo
                        </span>
                        <span th:if="${!u.activo}"
                              class="inline-flex rounded-full border border-rose-400/40 bg-rose-500/10 px-2.5 py-1 text-xs font-semibold text-rose-200">
                            Inactivo
                        </span>
                    </td>
                    <td class="whitespace-nowrap px-5 py-4">
                        <div class="flex items-center justify-center gap-2">
                            <a th:href="@{/admin/usuarios/editar/{id}(id=${u.id})}"
                               class="inline-flex h-9 w-9 items-center justify-center rounded-lg bg-cyan-500 text-slate-950 transition hover:bg-cyan-400"
                               title="Editar usuario"
                               aria-label="Editar usuario">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zm17.71-10.04a1.003 1.003 0 000-1.42l-2.5-2.5a1.003 1.003 0 00-1.42 0l-1.83 1.83 3.75 3.75 2-1.66z"/>
                                </svg>
                            </a>

                            <button type="button"
                                    th:if="${u.activo}"
                                    th:attr="data-id=${u.id},data-nombre=${u.nombreCompleto},data-activo=${u.activo}"
                                    onclick="abrirModalEstado(this)"
                                    class="inline-flex h-9 w-9 items-center justify-center rounded-lg border border-rose-400/50 bg-rose-500/10 text-rose-200 transition hover:bg-rose-500/20"
                                    title="Desactivar usuario"
                                    aria-label="Desactivar usuario">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v9m6.36-6.36a9 9 0 1 1-12.72 0"/>
                                </svg>
                            </button>

                            <button type="button"
                                    th:if="${!u.activo}"
                                    th:attr="data-id=${u.id},data-nombre=${u.nombreCompleto},data-activo=${u.activo}"
                                    onclick="abrirModalEstado(this)"
                                    class="inline-flex h-9 w-9 items-center justify-center rounded-lg border border-emerald-400/40 bg-emerald-500/10 text-emerald-200 transition hover:bg-emerald-500/20"
                                    title="Activar usuario"
                                    aria-label="Activar usuario">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v9m6.36-6.36a9 9 0 1 1-12.72 0"/>
                                </svg>
                            </button>
                        </div>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(usuarios)}">
                    <td colspan="6" class="px-5 py-10 text-center text-slate-400">Aun no hay usuarios para mostrar. Falta ingresar datos.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div th:if="${pagina.totalPages > 0}" class="mt-5 rounded-2xl border border-white/10 bg-slate-900/60 p-3">
        <div class="flex flex-wrap items-center justify-between gap-3">
            <p class="text-sm text-slate-400">
                Pagina <span class="font-semibold text-slate-200" th:text="${pagina.number + 1}"></span> de <span class="font-semibold text-slate-200" th:text="${pagina.totalPages}"></span>
            </p>
            <div class="inline-flex items-center gap-1 rounded-xl border border-slate-700 bg-slate-950/50 p-1">
            <a th:if="${!pagina.first}"
               th:href="@{/admin/usuarios(page=${pagina.number - 1},estado=${estadoSeleccionado},q=${busqueda})}"
               class="rounded-lg px-3 py-1.5 text-sm text-slate-200 transition hover:bg-slate-800">
                Anterior
            </a>
            <a th:each="i : ${pageNumbers}"
               th:href="@{/admin/usuarios(page=${i},estado=${estadoSeleccionado},q=${busqueda})}"
               th:text="${i + 1}"
               th:classappend="${i == pagina.number} ? ' bg-cyan-500 text-slate-950' : ' text-slate-200 hover:bg-slate-800'"
               class="rounded-lg px-3 py-1.5 text-sm transition">
            </a>
            <a th:if="${!pagina.last}"
               th:href="@{/admin/usuarios(page=${pagina.number + 1},estado=${estadoSeleccionado},q=${busqueda})}"
               class="rounded-lg px-3 py-1.5 text-sm text-slate-200 transition hover:bg-slate-800">
                Siguiente
            </a>
            </div>
        </div>
    </div>

    <div id="modalEstadoUsuario" class="fixed inset-0 z-50 hidden items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-950/80 backdrop-blur-sm" onclick="cerrarModalEstado()"></div>

        <div id="modalEstadoPanel" class="relative w-full max-w-md rounded-2xl border bg-slate-900 p-6 shadow-2xl shadow-slate-950/60">
            <div id="modalEstadoIconWrap" class="mb-4 inline-flex h-11 w-11 items-center justify-center rounded-xl border">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v9m6.36-6.36a9 9 0 1 1-12.72 0"/>
                </svg>
            </div>

            <h3 id="modalEstadoTitulo" class="text-lg font-semibold text-white"></h3>
            <p class="mt-2 text-sm text-slate-300">
                ¿Desea <span id="modalEstadoMensajeAccion"></span> la cuenta del usuario
                <span id="usuarioModalNombre" class="font-semibold"></span>?
            </p>

            <div class="mt-6 flex items-center justify-end gap-3">
                <button type="button"
                        onclick="cerrarModalEstado()"
                        class="rounded-xl border border-slate-700 px-4 py-2 text-sm font-semibold text-slate-200 transition hover:border-slate-500 hover:bg-slate-800">
                    Cancelar
                </button>
                <a id="btnConfirmarEstado"
                   href="#"
                   class="rounded-xl px-4 py-2 text-sm font-semibold text-white transition">
                </a>
            </div>
        </div>
    </div>

    <script>
        const modalEstadoUsuario = document.getElementById('modalEstadoUsuario');
        const modalEstadoPanel = document.getElementById('modalEstadoPanel');
        const modalEstadoIconWrap = document.getElementById('modalEstadoIconWrap');
        const modalEstadoTitulo = document.getElementById('modalEstadoTitulo');
        const modalEstadoMensajeAccion = document.getElementById('modalEstadoMensajeAccion');
        const usuarioModalNombre = document.getElementById('usuarioModalNombre');
        const btnConfirmarEstado = document.getElementById('btnConfirmarEstado');

        function abrirModalEstado(button) {
            const id = button.dataset.id;
            const nombre = button.dataset.nombre || 'este usuario';
            const activo = button.dataset.activo === 'true';
            const accion = activo ? 'Desactivar' : 'Activar';

            modalEstadoTitulo.textContent = accion + ' usuario';
            modalEstadoMensajeAccion.textContent = activo ? 'desactivar' : 'activar';
            usuarioModalNombre.textContent = nombre;

            if (activo) {
                usuarioModalNombre.className = 'font-semibold text-rose-200';
                modalEstadoPanel.className = 'relative w-full max-w-md rounded-2xl border border-rose-400/30 bg-slate-900 p-6 shadow-2xl shadow-slate-950/60';
                modalEstadoIconWrap.className = 'mb-4 inline-flex h-11 w-11 items-center justify-center rounded-xl border border-rose-400/40 bg-rose-500/10 text-rose-200';
                btnConfirmarEstado.className = 'rounded-xl bg-rose-500 px-4 py-2 text-sm font-semibold text-white transition hover:bg-rose-400';
                btnConfirmarEstado.textContent = 'Confirmar desactivación';
            } else {
                usuarioModalNombre.className = 'font-semibold text-emerald-200';
                modalEstadoPanel.className = 'relative w-full max-w-md rounded-2xl border border-emerald-400/30 bg-slate-900 p-6 shadow-2xl shadow-slate-950/60';
                modalEstadoIconWrap.className = 'mb-4 inline-flex h-11 w-11 items-center justify-center rounded-xl border border-emerald-400/40 bg-emerald-500/10 text-emerald-200';
                btnConfirmarEstado.className = 'rounded-xl bg-emerald-500 px-4 py-2 text-sm font-semibold text-slate-950 transition hover:bg-emerald-400';
                btnConfirmarEstado.textContent = 'Confirmar activación';
            }

            btnConfirmarEstado.href = '/admin/usuarios/estado/' + id;

            modalEstadoUsuario.classList.remove('hidden');
            modalEstadoUsuario.classList.add('flex');
        }

        function cerrarModalEstado() {
            modalEstadoUsuario.classList.remove('flex');
            modalEstadoUsuario.classList.add('hidden');
        }

        document.addEventListener('keydown', function (event) {
            if (event.key === 'Escape' && !modalEstadoUsuario.classList.contains('hidden')) {
                cerrarModalEstado();
            }
        });

        modalEstadoUsuario.addEventListener('click', function (event) {
            if (event.target === modalEstadoUsuario) {
                cerrarModalEstado();
            }
        });
    </script>
    <script th:inline="javascript">
        const params = new URLSearchParams(window.location.search);
        if (params.get('estadoActualizado') === 'true') {
            const toast = document.createElement('div');
            toast.className = 'fixed bottom-6 right-6 z-50 rounded-xl border border-emerald-400/40 bg-emerald-500/15 px-4 py-3 text-sm font-semibold text-emerald-200 shadow-2xl shadow-slate-950/50';
            toast.textContent = 'Estado de usuario actualizado correctamente.';
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2600);
        }
    </script>
</section>
</html>
