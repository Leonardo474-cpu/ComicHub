<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/components/layout :: layout('Ruta no encontrada - Admin', 'Ruta no encontrada', 'La página solicitada no existe en el panel de administración.', 'dashboard', 'dashboard', 'Volver al dashboard', '/admin', ~{::section})}">
<section>
    <article class="rounded-2xl border border-rose-400/30 bg-rose-500/10 p-8 shadow-2xl shadow-slate-950/40">
        <div class="mb-4 inline-flex h-12 w-12 items-center justify-center rounded-xl border border-rose-400/40 bg-rose-500/20 text-rose-100">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="8" x2="12" y2="12"></line>
                <line x1="12" y1="16" x2="12.01" y2="16"></line>
            </svg>
        </div>
        <h2 class="text-3xl font-bold text-white">Error 404</h2>
        <p class="mt-3 text-slate-200">No se encontró la ruta solicitada en el panel admin.</p>
        <p class="mt-2 text-sm text-slate-300">
            Ruta: <span class="font-semibold text-rose-100" th:text="${rutaSolicitada}">/admin/ruta</span>
        </p>
    </article>
</section>
</html>
