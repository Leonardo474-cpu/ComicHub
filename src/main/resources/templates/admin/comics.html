<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/components/layout :: layout('Comics - Admin', 'Comics', 'Gestiona comics publicados en la plataforma.', 'comics', ~{::section})}">
<section>
    <p th:if="${success}" th:text="${success}"
       class="mb-4 rounded-xl border border-emerald-400/40 bg-emerald-500/10 px-4 py-3 text-sm text-emerald-200"></p>

    <div class="mb-5 flex items-center justify-end">
        <a th:href="@{/admin/comics/nuevo}"
           class="rounded-xl bg-emerald-500 px-4 py-2.5 text-sm font-semibold text-slate-950 transition hover:bg-emerald-400">
            Agregar nuevo comic
        </a>
    </div>

    <div class="overflow-hidden rounded-2xl border border-white/10 bg-slate-900/60 shadow-2xl shadow-slate-950/40">
        <div class="overflow-x-auto">
            <table class="min-w-full divide-y divide-slate-800 text-sm">
                <thead class="bg-slate-900/80 text-left text-xs uppercase tracking-wider text-slate-400">
                <tr>
                    <th class="px-5 py-4 font-semibold">ID</th>
                    <th class="px-5 py-4 font-semibold">Titulo</th>
                    <th class="px-5 py-4 font-semibold">Autor</th>
                    <th class="px-5 py-4 font-semibold">Categoria</th>
                    <th class="px-5 py-4 font-semibold">Estado</th>
                    <th class="px-5 py-4 font-semibold">Activo</th>
                    <th class="px-5 py-4 text-center font-semibold">Acciones</th>
                </tr>
                </thead>
                <tbody class="divide-y divide-slate-800 text-slate-200">
                <tr th:each="c : ${comics}" class="hover:bg-slate-800/50 transition">
                    <td class="whitespace-nowrap px-5 py-4" th:text="${c.idComic}"></td>
                    <td class="whitespace-nowrap px-5 py-4 font-semibold" th:text="${c.titulo}"></td>
                    <td class="whitespace-nowrap px-5 py-4" th:text="${c.autor}"></td>
                    <td class="whitespace-nowrap px-5 py-4" th:text="${c.categoria}"></td>
                    <td class="whitespace-nowrap px-5 py-4" th:text="${#strings.replace(c.estado.name(), '_', ' ')}"></td>
                    <td class="whitespace-nowrap px-5 py-4">
                        <span th:if="${c.activo}"
                              class="inline-flex rounded-full border border-emerald-400/40 bg-emerald-500/10 px-2.5 py-1 text-xs font-semibold text-emerald-200">
                            Activo
                        </span>
                        <span th:if="${!c.activo}"
                              class="inline-flex rounded-full border border-rose-400/40 bg-rose-500/10 px-2.5 py-1 text-xs font-semibold text-rose-200">
                            Desactivado
                        </span>
                    </td>
                    <td class="whitespace-nowrap px-5 py-4">
                        <div class="flex items-center justify-center gap-2">
                            <a th:href="@{/admin/comics/ver/{id}(id=${c.idComic})}"
                               class="inline-flex h-9 w-9 items-center justify-center rounded-lg border border-slate-600 bg-slate-800/80 text-slate-100 transition hover:border-cyan-400 hover:text-cyan-200"
                               title="Ver detalle"
                               aria-label="Ver detalle">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M1.5 12s4-7.5 10.5-7.5S22.5 12 22.5 12 18.5 19.5 12 19.5 1.5 12 1.5 12z"/>
                                    <circle cx="12" cy="12" r="3"/>
                                </svg>
                            </a>

                            <a th:href="@{/admin/comics/editar/{id}(id=${c.idComic})}"
                               class="inline-flex h-9 w-9 items-center justify-center rounded-lg bg-cyan-500 text-slate-950 transition hover:bg-cyan-400"
                               title="Editar comic"
                               aria-label="Editar comic">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zm17.71-10.04a1.003 1.003 0 000-1.42l-2.5-2.5a1.003 1.003 0 00-1.42 0l-1.83 1.83 3.75 3.75 2-1.66z"/>
                                </svg>
                            </a>

                            <button type="button"
                                    th:attr="data-id=${c.idComic},data-titulo=${c.titulo},data-activo=${c.activo}"
                                    onclick="abrirModalEstadoComic(this)"
                                    th:classappend="${c.activo} ? ' border-rose-400/50 bg-rose-500/10 text-rose-200 hover:bg-rose-500/20' : ' border-emerald-400/40 bg-emerald-500/10 text-emerald-200 hover:bg-emerald-500/20'"
                                    class="inline-flex h-9 w-9 items-center justify-center rounded-lg border transition"
                                    th:title="${c.activo} ? 'Desactivar comic' : 'Activar comic'"
                                    th:aria-label="${c.activo} ? 'Desactivar comic' : 'Activar comic'">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v9m6.36-6.36a9 9 0 1 1-12.72 0"/>
                                </svg>
                            </button>
                        </div>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(comics)}">
                    <td colspan="7" class="px-5 py-10 text-center text-slate-400">No hay comics registrados.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div id="modalEstadoComic" class="fixed inset-0 z-50 hidden items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-950/80 backdrop-blur-sm" onclick="cerrarModalEstadoComic()"></div>
        <div id="modalEstadoComicPanel" class="relative w-full max-w-md rounded-2xl border bg-slate-900 p-6 shadow-2xl shadow-slate-950/60">
            <h3 id="modalEstadoComicTitulo" class="text-lg font-semibold text-white"></h3>
            <p class="mt-2 text-sm text-slate-300">
                ¿Desea <span id="modalEstadoComicMensajeAccion"></span> el comic
                <span id="comicModalTitulo" class="font-semibold"></span>?
            </p>
            <div class="mt-6 flex items-center justify-end gap-3">
                <button type="button"
                        onclick="cerrarModalEstadoComic()"
                        class="rounded-xl border border-slate-700 px-4 py-2 text-sm font-semibold text-slate-200 transition hover:border-slate-500 hover:bg-slate-800">
                    Cancelar
                </button>
                <a id="btnConfirmarEstadoComic"
                   href="#"
                   class="rounded-xl px-4 py-2 text-sm font-semibold text-white transition">
                </a>
            </div>
        </div>
    </div>

    <script>
        const modalEstadoComic = document.getElementById('modalEstadoComic');
        const modalEstadoComicPanel = document.getElementById('modalEstadoComicPanel');
        const modalEstadoComicTitulo = document.getElementById('modalEstadoComicTitulo');
        const modalEstadoComicMensajeAccion = document.getElementById('modalEstadoComicMensajeAccion');
        const comicModalTitulo = document.getElementById('comicModalTitulo');
        const btnConfirmarEstadoComic = document.getElementById('btnConfirmarEstadoComic');

        function abrirModalEstadoComic(button) {
            const id = button.dataset.id;
            const titulo = button.dataset.titulo || 'este comic';
            const activo = button.dataset.activo === 'true';
            const accion = activo ? 'Desactivar' : 'Activar';

            modalEstadoComicTitulo.textContent = accion + ' comic';
            modalEstadoComicMensajeAccion.textContent = activo ? 'desactivar' : 'activar';
            comicModalTitulo.textContent = titulo;

            if (activo) {
                comicModalTitulo.className = 'font-semibold text-rose-200';
                modalEstadoComicPanel.className = 'relative w-full max-w-md rounded-2xl border border-rose-400/30 bg-slate-900 p-6 shadow-2xl shadow-slate-950/60';
                btnConfirmarEstadoComic.className = 'rounded-xl bg-rose-500 px-4 py-2 text-sm font-semibold text-white transition hover:bg-rose-400';
                btnConfirmarEstadoComic.textContent = 'Confirmar desactivacion';
            } else {
                comicModalTitulo.className = 'font-semibold text-emerald-200';
                modalEstadoComicPanel.className = 'relative w-full max-w-md rounded-2xl border border-emerald-400/30 bg-slate-900 p-6 shadow-2xl shadow-slate-950/60';
                btnConfirmarEstadoComic.className = 'rounded-xl bg-emerald-500 px-4 py-2 text-sm font-semibold text-slate-950 transition hover:bg-emerald-400';
                btnConfirmarEstadoComic.textContent = 'Confirmar activacion';
            }

            btnConfirmarEstadoComic.href = '/admin/comics/estado/' + id;
            modalEstadoComic.classList.remove('hidden');
            modalEstadoComic.classList.add('flex');
        }

        function cerrarModalEstadoComic() {
            modalEstadoComic.classList.remove('flex');
            modalEstadoComic.classList.add('hidden');
        }

        document.addEventListener('keydown', function (event) {
            if (event.key === 'Escape' && !modalEstadoComic.classList.contains('hidden')) {
                cerrarModalEstadoComic();
            }
        });
    </script>
    <script th:inline="javascript">
        const paramsComics = new URLSearchParams(window.location.search);
        if (paramsComics.get('estadoActualizado') === 'true') {
            const toast = document.createElement('div');
            toast.className = 'fixed bottom-6 right-6 z-50 rounded-xl border border-emerald-400/40 bg-emerald-500/15 px-4 py-3 text-sm font-semibold text-emerald-200 shadow-2xl shadow-slate-950/50';
            toast.textContent = 'Estado de comic actualizado correctamente.';
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2600);
        }
    </script>
</section>
</html>
