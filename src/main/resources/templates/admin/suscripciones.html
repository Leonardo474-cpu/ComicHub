<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
	th:replace="~{admin/components/layout :: layout('Suscripciones - Admin', 'Suscripciones', 'Control de usuarios suscritos.', 'suscripciones', ~{::section})}">

<section>

	<div
		class="overflow-hidden rounded-2xl border border-white/10 bg-slate-900/60 shadow-2xl shadow-slate-950/40">

		<div class="overflow-x-auto">
			<table class="min-w-full divide-y divide-slate-800 text-sm">

				<thead
					class="bg-slate-900/80 text-left text-xs uppercase tracking-wider text-slate-400">
					<tr>
						<th class="px-5 py-4 font-semibold">ID</th>
						<th class="px-5 py-4 font-semibold">Usuario</th>
						<th class="px-5 py-4 font-semibold">Plan</th>
						<th class="px-5 py-4 font-semibold">Inicio</th>
						<th class="px-5 py-4 font-semibold">Fin</th>
						<th class="px-5 py-4 font-semibold">Estado</th>
					</tr>
				</thead>

				<tbody class="divide-y divide-slate-800 text-slate-200">

					<tr th:each="s : ${suscripciones}"
						class="hover:bg-slate-800/50 transition">

						<td class="whitespace-nowrap px-5 py-4"
							th:text="${s.id_suscripcion}"></td>

						<td class="whitespace-nowrap px-5 py-4"
							th:text="${s.usuario.nombreCompleto}"></td>

						<td class="whitespace-nowrap px-5 py-4"><span
							class="inline-flex rounded-full border border-cyan-400/40 bg-cyan-400/10 px-2.5 py-1 text-xs font-semibold text-cyan-200"
							th:text="${s.plan.nombrePlan}"> </span></td>

						<td class="whitespace-nowrap px-5 py-4"
							th:text="${s.fecha_inicio}"></td>

						<td class="whitespace-nowrap px-5 py-4" th:text="${s.fecha_fin}">
						</td>

						<td class="whitespace-nowrap px-5 py-4"><span
							class="inline-flex rounded-full px-2.5 py-1 text-xs font-semibold"
							th:classappend="${s.estado == 'ACTIVO'} ? 
        ' border-emerald-400/40 bg-emerald-500/10 text-emerald-200' : 
        ' border-rose-400/40 bg-rose-500/10 text-rose-200'">

								<span th:text="${s.estado}"></span>

						</span></td>

					</tr>

					<tr th:if="${#lists.isEmpty(suscripciones)}">
						<td colspan="6" class="px-5 py-10 text-center text-slate-400">
							No hay suscripciones registradas.</td>
					</tr>

				</tbody>
			</table>
		</div>

	</div>
	<div class="mt-6 flex flex-wrap items-center justify-center gap-3">

		<!-- Exportar PDF -->
		<a th:href="@{/usuarios/pdf}" target="_blank"
			class="inline-flex items-center gap-2 rounded-xl
               border border-rose-400/40 bg-rose-500/10
               px-4 py-2 text-sm font-semibold text-rose-200
               shadow-lg shadow-rose-900/20
               transition hover:bg-rose-500/20 hover:scale-105">
			📄 Exportar PDF </a>

		<!-- Exportar PDF con gráfico -->
		<a th:href="@{/usuarios/pdf-grafico}" target="_blank"
			class="inline-flex items-center gap-2 rounded-xl
               border border-indigo-400/40 bg-indigo-500/10
               px-4 py-2 text-sm font-semibold text-indigo-200
               shadow-lg shadow-indigo-900/20
               transition hover:bg-indigo-500/20 hover:scale-105">
			📊 Exportar PDF con gráfico </a>

	</div>
</section>

</html>
