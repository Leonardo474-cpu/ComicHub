<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ComicHub - Ruta no encontrada</title>
<link rel="icon" type="image/png" href="/img/icon.png"
	th:href="@{/img/icon.png}">
<link rel="shortcut icon" href="/favicon.ico" th:href="@{/favicon.ico}">
<style>
body {
	margin: 0;
	min-height: 100vh;
	display: flex;
	flex-direction: column;
	font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
	background: linear-gradient(to bottom, #101b32 0%, #18253d 25%, #26344b 100%);
	color: #e5e7eb;
}

.navbar {
	position: sticky;
	top: 0;
	z-index: 30;
	border-bottom: 1px solid rgba(255, 255, 255, 0.08);
	background: linear-gradient(90deg, #0f1f3a 0%, #121f39 55%, #101b32 100%);
}

.navbar-inner {
	max-width: 1420px;
	margin: 0 auto;
	display: flex;
	align-items: center;
	justify-content: space-between;
	padding: 14px 34px;
}

.nav-left {
	display: flex;
	align-items: center;
	gap: 44px;
}

.logo-wrap {
	display: flex;
	align-items: center;
	height: 64px;
	margin-right: 12px;
}

.logo-img {
	height: 64px;
	width: auto;
	max-width: 250px;
	object-fit: contain;
	transform: scale(1.22);
	transform-origin: left center;
	filter: drop-shadow(0 4px 10px rgba(0, 0, 0, 0.5));
}

.menu {
	display: flex;
	align-items: center;
	gap: 8px;
	margin-left: 20px;
}

.menu a {
	display: inline-flex;
	align-items: center;
	gap: 8px;
	color: #f1f5f9;
	text-decoration: none;
	padding: 9px 14px;
	border-radius: 11px;
	font-size: 14px;
	transition: 0.2s;
}

.menu a:hover {
	background: rgba(255, 255, 255, 0.1);
}

.menu a.active {
	background: rgba(246, 157, 17, 0.25);
	color: #ffb326;
	font-weight: 700;
}

.menu svg {
	width: 17px;
	height: 17px;
}

.nav-right {
	display: flex;
	align-items: center;
	gap: 16px;
}

.icon-btn {
	border: 0;
	background: transparent;
	color: #f8fafc;
	width: 36px;
	height: 36px;
	border-radius: 999px;
	cursor: pointer;
	display: inline-flex;
	align-items: center;
	justify-content: center;
	transition: background 0.2s;
	text-decoration: none;
}

.icon-btn:hover {
	background: rgba(255, 255, 255, 0.12);
}

.icon-btn svg {
	width: 22px;
	height: 22px;
}

.main {
	flex: 1;
	width: 100%;
	box-sizing: border-box;
	max-width: 1100px;
	margin: 0 auto;
	padding: 44px 24px 64px;
}

.error-card {
	border-radius: 20px;
	border: 1px solid rgba(244, 63, 94, 0.35);
	background: linear-gradient(160deg, rgba(36, 51, 79, 0.95),
		rgba(30, 42, 65, 0.9));
	padding: 36px;
	box-shadow: 0 25px 40px rgba(0, 0, 0, 0.3);
}

.error-icon {
	width: 58px;
	height: 58px;
	border-radius: 14px;
	display: inline-flex;
	align-items: center;
	justify-content: center;
	border: 1px solid rgba(251, 113, 133, 0.45);
	background: rgba(251, 113, 133, 0.15);
	color: #fecdd3;
}

.error-card h1 {
	margin: 16px 0 10px;
	font-size: 42px;
}

.error-card p {
	margin: 0;
	color: #cbd5e1;
	line-height: 1.45;
}

.error-route {
	margin-top: 14px;
	color: #fda4af;
	font-weight: 600;
}

.error-actions {
	margin-top: 22px;
	display: flex;
	gap: 12px;
	flex-wrap: wrap;
}

.error-btn {
	text-decoration: none;
	border-radius: 10px;
	padding: 10px 16px;
	font-weight: 700;
	font-size: 14px;
}

.error-btn.primary {
	background: #f4a209;
	color: #101828;
}

.error-btn.secondary {
	border: 1px solid rgba(255, 255, 255, 0.2);
	color: #e2e8f0;
}

.site-footer {
	border-top: 1px solid rgba(255, 255, 255, 0.07);
	background: #0f1d34;
}

.footer-inner {
	max-width: 1280px;
	margin: 0 auto;
	padding: 30px 34px 36px;
	display: flex;
	align-items: flex-start;
	justify-content: space-between;
	gap: 24px;
}

.footer-left p {
	margin: 12px 0 0;
	max-width: 700px;
	color: #9bb0cf;
	line-height: 1.35;
}

.footer-links {
	display: flex;
	align-items: center;
	gap: 16px;
	margin-top: 2px;
}

.footer-top {
	width: 48px;
	height: 48px;
	border-radius: 8px;
	border: 1px solid rgba(255, 255, 255, 0.08);
	background: #22324b;
	color: #f8fafc;
	display: inline-flex;
	align-items: center;
	justify-content: center;
	text-decoration: none;
	font-size: 24px;
}

.footer-links a {
	color: #f8fafc;
	text-decoration: none;
	font-size: 18px;
	font-weight: 600;
}

.footer-right {
	display: flex;
	align-items: center;
	gap: 16px;
	min-width: 360px;
	justify-content: flex-end;
}

.footer-brand-logo {
	width: 94px;
	height: 94px;
	object-fit: contain;
	border-radius: 999px;
	background: rgba(255, 255, 255, 0.06);
	padding: 8px;
}

.footer-brand h4 {
	margin: 0;
	font-size: 22px;
	color: #f8fafc;
}

.footer-brand p {
	margin: 4px 0 0;
	color: #9bb0cf;
}

.footer-discord {
	margin-top: 8px;
	width: 24px;
	height: 24px;
	color: #7c8cff;
}

.logout-overlay {
	position: fixed;
	inset: 0;
	background: rgba(5, 10, 22, 0.76);
	backdrop-filter: blur(8px);
	z-index: 70;
	display: none;
}

.logout-overlay.open {
	display: block;
}

.logout-modal {
	position: fixed;
	top: 50%;
	left: 50%;
	transform: translate(-50%, -50%);
	width: min(94vw, 420px);
	border-radius: 16px;
	border: 1px solid rgba(255, 255, 255, 0.18);
	background: linear-gradient(180deg, #253752 0%, #1e2d46 100%);
	box-shadow: 0 20px 50px rgba(0, 0, 0, 0.45);
	z-index: 75;
	padding: 22px;
	display: none;
}

.logout-modal.open {
	display: block;
}

.logout-icon {
	width: 46px;
	height: 46px;
	border-radius: 12px;
	border: 1px solid rgba(251, 146, 60, 0.45);
	background: rgba(251, 146, 60, 0.16);
	color: #fdba74;
	display: inline-flex;
	align-items: center;
	justify-content: center;
}

.logout-modal h3 {
	margin: 14px 0 8px;
	font-size: 24px;
}

.logout-modal p {
	margin: 0;
	color: #cbd5e1;
}

.logout-actions {
	margin-top: 18px;
	display: flex;
	justify-content: flex-end;
	gap: 10px;
}

.logout-actions button, .logout-actions a {
	border: 0;
	border-radius: 10px;
	padding: 10px 14px;
	cursor: pointer;
	text-decoration: none;
	font-weight: 700;
	font-size: 14px;
}

.logout-cancel {
	background: rgba(255, 255, 255, 0.14);
	color: #f8fafc;
}

.logout-confirm {
	background: #f4a209;
	color: #101828;
}

@media ( max-width : 980px) {
	.navbar-inner {
		padding: 12px 16px;
	}
	.logo-img {
		height: 46px;
		transform: scale(1.1);
	}
	.menu {
		gap: 4px;
		margin-left: 0;
	}
	.menu a {
		padding: 8px 10px;
		font-size: 14px;
	}
	.menu a .menu-text {
		display: none;
	}
	.footer-inner {
		flex-direction: column;
		padding: 24px 16px 30px;
	}
	.error-card {
		padding: 26px 18px;
	}
	.error-card h1 {
		font-size: 34px;
	}
}
</style>
</head>
<body id="top">
	<div
		th:replace="~{components/client-layout :: navbar('none', ${tieneSuscripcionActiva}, ${nombreUsuarioMenu}, ${nombrePlanMenu})}"></div>

	<main class="main">
		<section class="error-card">
			<span class="error-icon"> <svg
					xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
					stroke="currentColor" stroke-width="2"
					style="width: 24px; height: 24px;">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="8" x2="12" y2="12"></line>
                <line x1="12" y1="16" x2="12.01" y2="16"></line>
            </svg>
			</span>
			<h1>Error 404</h1>
			<p>No se encontró la ruta que estás buscando en ComicHub.</p>
			<p class="error-route">
				Ruta solicitada: <span th:text="${rutaSolicitada}">/ruta/no-encontrada</span>
			</p>

			<div class="error-actions">
				<a class="error-btn primary" th:href="@{/home}">Volver al inicio</a>
				<a class="error-btn secondary" th:href="@{/suscripciones}">Ir a
					suscripciones</a>
			</div>
		</section>
	</main>

	<footer th:replace="~{components/client-layout :: footer}"></footer>

	<div id="logoutOverlay" class="logout-overlay"></div>
	<div id="logoutModal" class="logout-modal">
		<span class="logout-icon"> <svg
				xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
				stroke="currentColor" stroke-width="2"
				style="width: 22px; height: 22px;">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <path d="M16 17l5-5-5-5"></path>
            <path d="M21 12H9"></path>
        </svg>
		</span>
		<h3>¿Cerrar sesión?</h3>
		<p>Vas a salir de tu cuenta actual. ¿Deseas continuar?</p>
		<div class="logout-actions">
			<button type="button" id="btnLogoutCancel" class="logout-cancel">Cancelar</button>
			<a th:href="@{/logout}" class="logout-confirm">Sí, cerrar sesión</a>
		</div>
	</div>

	<script>
    const btnLogoutOpen = document.getElementById('btnLogoutOpen');
    const logoutOverlay = document.getElementById('logoutOverlay');
    const logoutModal = document.getElementById('logoutModal');
    const btnLogoutCancel = document.getElementById('btnLogoutCancel');

    function openLogoutModal() {
        logoutOverlay.classList.add('open');
        logoutModal.classList.add('open');
    }

    function closeLogoutModal() {
        logoutOverlay.classList.remove('open');
        logoutModal.classList.remove('open');
    }

    if (btnLogoutOpen) {
        btnLogoutOpen.addEventListener('click', openLogoutModal);
    }
    if (btnLogoutCancel) {
        btnLogoutCancel.addEventListener('click', closeLogoutModal);
    }
    logoutOverlay.addEventListener('click', closeLogoutModal);

    document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape' && logoutModal.classList.contains('open')) {
            closeLogoutModal();
        }
    });
</script>
</body>
</html>
