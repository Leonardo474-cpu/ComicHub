<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title th:text="${comic != null ? comic.titulo + ' - ComicHub' : 'Comic - ComicHub'}">Comic - ComicHub</title>
<link rel="icon" type="image/png" href="/img/icon.png" th:href="@{/img/icon.png}">
<link rel="shortcut icon" href="/favicon.ico" th:href="@{/favicon.ico}">
<style>
body {
    margin: 0;
    font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    background: radial-gradient(circle at 15% 15%, #16274a 0%, #101c34 45%, #0c162d 100%);
    color: #e5e7eb;
}

.navbar {
    position: sticky;
    top: 0;
    z-index: 30;
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    background: linear-gradient(90deg, #0f1f3a 0%, #121f39 55%, #101b32 100%);
}

.navbar-inner {
    max-width: 1420px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 34px;
}

.nav-left {
    display: flex;
    align-items: center;
    gap: 44px;
}

.logo-wrap {
    display: flex;
    align-items: center;
    height: 64px;
    margin-right: 12px;
}

.logo-img {
    height: 64px;
    width: auto;
    max-width: 250px;
    object-fit: contain;
    transform: scale(1.22);
    transform-origin: left center;
    filter: drop-shadow(0 4px 10px rgba(0, 0, 0, 0.5));
}

.menu {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-left: 20px;
}

.menu a {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    color: #f1f5f9;
    text-decoration: none;
    padding: 9px 14px;
    border-radius: 11px;
    font-size: 14px;
    transition: 0.2s;
}

.menu a:hover {
    background: rgba(255, 255, 255, 0.1);
}

.menu a.active {
    background: rgba(246, 157, 17, 0.25);
    color: #ffb326;
    font-weight: 700;
}

.menu svg {
    width: 17px;
    height: 17px;
}

.nav-right {
    display: flex;
    align-items: center;
    gap: 16px;
}

.icon-btn {
    border: 0;
    background: transparent;
    color: #f8fafc;
    width: 36px;
    height: 36px;
    border-radius: 999px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
}

.icon-btn:hover {
    background: rgba(255, 255, 255, 0.12);
}

.icon-btn svg {
    width: 22px;
    height: 22px;
}

.detail-wrap {
    max-width: 1100px;
    margin: 26px auto 56px;
    padding: 0 18px;
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 24px;
}

.card-left,
.card-right {
    border: 1px solid rgba(148, 163, 184, 0.25);
    border-radius: 14px;
    background: rgba(15, 23, 42, 0.78);
}

.card-left {
    padding: 14px;
}

.cover {
    width: 100%;
    height: 390px;
    border-radius: 10px;
    object-fit: cover;
    display: block;
}

.cover-empty {
    height: 390px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #94a3b8;
    font-weight: 700;
    background: linear-gradient(135deg, rgba(30, 41, 59, 0.85), rgba(15, 23, 42, 0.95));
}

.title {
    margin: 14px 0 8px;
    font-size: 31px;
    line-height: 1.2;
    color: #f8fafc;
}

.chip {
    display: inline-flex;
    border: 1px solid rgba(56, 189, 248, 0.4);
    color: #67e8f9;
    background: rgba(8, 145, 178, 0.2);
    border-radius: 999px;
    font-size: 12px;
    font-weight: 700;
    padding: 6px 10px;
    margin-bottom: 10px;
}

.btn-back {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    margin-top: 14px;
    border-radius: 10px;
    background: #fbbf24;
    color: #111827;
    padding: 10px 12px;
    font-weight: 700;
    text-decoration: none;
}

.btn-back:hover {
    background: #f59e0b;
}

.card-right {
    padding: 18px 22px;
}

.tabs {
    display: flex;
    gap: 10px;
    margin-bottom: 14px;
}

.tab {
    border: 1px solid rgba(148, 163, 184, 0.4);
    color: #e2e8f0;
    border-radius: 999px;
    padding: 7px 14px;
    font-size: 13px;
    background: transparent;
    cursor: pointer;
}

.tab.active {
    border-color: rgba(251, 191, 36, 0.85);
    color: #fbbf24;
    background: rgba(251, 191, 36, 0.1);
    font-weight: 700;
}

.subtitle {
    margin: 18px 0 10px;
    font-size: 24px;
    color: #f8fafc;
}

.description {
    margin: 0;
    color: #cbd5e1;
    line-height: 1.65;
}

.meta {
    margin-top: 20px;
    border-top: 1px solid rgba(148, 163, 184, 0.22);
    padding-top: 14px;
    display: grid;
    grid-template-columns: repeat(2, minmax(220px, 1fr));
    gap: 10px 22px;
}

.meta-item {
    color: #94a3b8;
    font-size: 14px;
}

.meta-item strong {
    color: #f8fafc;
    margin-left: 8px;
}

.panel {
    display: none;
}

.panel.active {
    display: block;
}

.placeholder-note {
    color: #94a3b8;
    margin-top: 8px;
}

.site-footer {
    border-top: 1px solid rgba(255, 255, 255, 0.07);
    background: #0f1d34;
}

.footer-inner {
    max-width: 1280px;
    margin: 0 auto;
    padding: 30px 34px 36px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 24px;
}

.footer-left p {
    margin: 12px 0 0;
    max-width: 700px;
    color: #9bb0cf;
    line-height: 1.35;
}

.footer-links {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-top: 2px;
}

.footer-top {
    width: 48px;
    height: 48px;
    border-radius: 8px;
    border: 1px solid rgba(255, 255, 255, 0.08);
    background: #22324b;
    color: #f8fafc;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    font-size: 24px;
}

.footer-links a {
    color: #f8fafc;
    text-decoration: none;
    font-size: 18px;
    font-weight: 600;
}

.footer-right {
    display: flex;
    align-items: center;
    gap: 16px;
    min-width: 360px;
    justify-content: flex-end;
}

.footer-brand-logo {
    width: 94px;
    height: 94px;
    object-fit: contain;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.06);
    padding: 8px;
}

.footer-brand h4 {
    margin: 0;
    font-size: 22px;
    color: #f8fafc;
}

.footer-brand p {
    margin: 4px 0 0;
    color: #9bb0cf;
}

.footer-discord {
    margin-top: 8px;
    width: 24px;
    height: 24px;
    color: #7c8cff;
}

@media (max-width: 980px) {
    .navbar-inner {
        padding: 12px 16px;
    }
    .logo-img {
        height: 46px;
        transform: scale(1.1);
    }
    .menu {
        gap: 4px;
        margin-left: 0;
    }
    .menu a {
        padding: 8px 10px;
        font-size: 14px;
    }
    .menu a .menu-text {
        display: none;
    }
    .detail-wrap {
        grid-template-columns: 1fr;
    }
    .cover {
        height: 360px;
    }
    .footer-inner {
        flex-direction: column;
        padding: 24px 16px 30px;
    }
}
</style>
</head>
<body id="top">
<div th:replace="~{components/client-layout :: navbar('series', ${tieneSuscripcionActiva}, ${nombreUsuarioMenu}, ${nombrePlanMenu})}"></div>

<main class="detail-wrap">
    <section class="card-left">
        <img class="cover"
             th:if="${comic.rutaImagenPortada != null and !#strings.isEmpty(comic.rutaImagenPortada)}"
             th:src="${comic.rutaImagenPortada}"
             th:alt="${comic.titulo}">
        <div class="cover-empty" th:if="${comic.rutaImagenPortada == null or #strings.isEmpty(comic.rutaImagenPortada)}">
            Sin portada
        </div>

        <h1 class="title" th:text="${comic.titulo}">Titulo del comic</h1>
        <span class="chip" th:text="${comic.activo} ? 'Activo' : 'Inactivo'">Activo</span>
        <a class="btn-back" th:href="@{/home}">Volver al inicio</a>
    </section>

    <section class="card-right">
        <div class="tabs">
            <button type="button" class="tab active" data-tab="sinopsis">Sinopsis</button>
            <button type="button" class="tab" data-tab="comentarios">Comentarios</button>
        </div>

        <div id="panel-sinopsis" class="panel active">
            <h2 class="subtitle">Introduccion</h2>
            <p class="description" th:text="${comic.sinopsis != null and !#strings.isEmpty(comic.sinopsis) ? comic.sinopsis : 'Sinopsis no disponible para este comic.'}">
                Sinopsis
            </p>

            <div class="meta">
                <div class="meta-item">Autor:<strong th:text="${comic.autor != null ? comic.autor.nombre : 'No disponible'}">Autor</strong></div>
                <div class="meta-item">Categoria:<strong th:text="${comic.categoria != null ? comic.categoria.descripcion : 'No disponible'}">Categoria</strong></div>
                <div class="meta-item">Estado editorial:<strong th:text="${comic.estado != null ? #strings.replace(comic.estado.name(), '_', ' ') : 'No definido'}">Estado</strong></div>
                <div class="meta-item">ID comic:<strong th:text="${comic.idComic}">0</strong></div>
            </div>
        </div>

        <div id="panel-comentarios" class="panel">
            <h2 class="subtitle">Comentarios</h2>
            <p class="description">Seccion en preparacion.</p>
            <p class="placeholder-note">Por ahora solo esta habilitada la pestaña de sinopsis.</p>
        </div>
    </section>
</main>

<footer th:replace="~{components/client-layout :: footer}"></footer>
<script>
    const tabs = document.querySelectorAll('[data-tab]');
    const panels = {
        sinopsis: document.getElementById('panel-sinopsis'),
        comentarios: document.getElementById('panel-comentarios')
    };

    tabs.forEach((tab) => {
        tab.addEventListener('click', () => {
            tabs.forEach((t) => t.classList.remove('active'));
            tab.classList.add('active');
            Object.values(panels).forEach((panel) => panel.classList.remove('active'));
            const panel = panels[tab.dataset.tab];
            if (panel) {
                panel.classList.add('active');
            }
        });
    });
</script>
</body>
</html>
