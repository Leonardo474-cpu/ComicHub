<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title th:text="${comic != null ? comic.titulo + ' - ComicHub' : 'Comic - ComicHub'}">Comic - ComicHub</title>
<link rel="icon" type="image/png" href="/img/icon.png" th:href="@{/img/icon.png}">
<link rel="shortcut icon" href="/favicon.ico" th:href="@{/favicon.ico}">
<style>
body {
    margin: 0;
    font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    background: radial-gradient(circle at 15% 15%, #16274a 0%, #101c34 45%, #0c162d 100%);
    color: #e5e7eb;
}

.detail-wrap {
    max-width: 1100px;
    margin: 26px auto 56px;
    padding: 0 18px;
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 24px;
}

.card-left,
.card-right {
    border: 1px solid rgba(148, 163, 184, 0.25);
    border-radius: 14px;
    background: rgba(15, 23, 42, 0.78);
}

.card-left {
    padding: 14px;
}

.cover {
    width: 100%;
    height: 390px;
    border-radius: 10px;
    object-fit: cover;
    display: block;
}

.title {
    margin: 14px 0 8px;
    font-size: 31px;
    line-height: 1.2;
    color: #f8fafc;
}

.chip {
    display: inline-flex;
    border: 1px solid rgba(56, 189, 248, 0.4);
    color: #67e8f9;
    background: rgba(8, 145, 178, 0.2);
    border-radius: 999px;
    font-size: 12px;
    font-weight: 700;
    padding: 6px 10px;
    margin-bottom: 10px;
}

.btn-back {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    margin-top: 14px;
    border-radius: 10px;
    background: #fbbf24;
    color: #111827;
    padding: 10px 12px;
    font-weight: 700;
    text-decoration: none;
}

.btn-back:hover {
    background: #f59e0b;
}

.card-right {
    padding: 18px 22px;
}

.tabs {
    display: flex;
    gap: 10px;
    margin-bottom: 14px;
}

.tab {
    border: 1px solid rgba(148, 163, 184, 0.4);
    color: #e2e8f0;
    border-radius: 999px;
    padding: 7px 14px;
    font-size: 13px;
}

.tab.active {
    border-color: rgba(251, 191, 36, 0.85);
    color: #fbbf24;
    background: rgba(251, 191, 36, 0.1);
    font-weight: 700;
}

.subtitle {
    margin: 18px 0 10px;
    font-size: 24px;
    color: #f8fafc;
}

.description {
    margin: 0;
    color: #cbd5e1;
    line-height: 1.65;
}

.meta {
    margin-top: 20px;
    border-top: 1px solid rgba(148, 163, 184, 0.22);
    padding-top: 14px;
    display: grid;
    grid-template-columns: repeat(2, minmax(220px, 1fr));
    gap: 10px 22px;
}

.meta-item {
    color: #94a3b8;
    font-size: 14px;
}

.meta-item strong {
    color: #f8fafc;
    margin-left: 8px;
}

@media (max-width: 980px) {
    .detail-wrap {
        grid-template-columns: 1fr;
    }
    .cover {
        height: 360px;
    }
}
</style>
</head>
<body>
<div th:replace="~{components/client-layout :: navbar('series', ${tieneSuscripcionActiva}, ${nombreUsuarioMenu}, ${nombrePlanMenu})}"></div>

<main class="detail-wrap">
    <section class="card-left">
        <img class="cover"
             th:if="${comic.rutaImagenPortada != null and !#strings.isEmpty(comic.rutaImagenPortada)}"
             th:src="${comic.rutaImagenPortada}"
             th:alt="${comic.titulo}">
        <img class="cover"
             th:if="${comic.rutaImagenPortada == null or #strings.isEmpty(comic.rutaImagenPortada)}"
             th:src="@{/img/logo.png}"
             th:alt="${comic.titulo}">

        <h1 class="title" th:text="${comic.titulo}">Titulo del comic</h1>
        <span class="chip" th:text="${comic.activo} ? 'Activo' : 'Inactivo'">Activo</span>
        <a class="btn-back" th:href="@{/home}">Volver al inicio</a>
    </section>

    <section class="card-right">
        <div class="tabs">
            <span class="tab">Capitulos</span>
            <span class="tab active">Sinopsis</span>
            <span class="tab">Comentarios</span>
        </div>

        <h2 class="subtitle">Introduccion</h2>
        <p class="description" th:text="${comic.sinopsis != null and !#strings.isEmpty(comic.sinopsis) ? comic.sinopsis : 'Sinopsis no disponible para este comic.'}">
            Sinopsis
        </p>

        <div class="meta">
            <div class="meta-item">Autor:<strong th:text="${comic.autor != null ? comic.autor.nombre : 'No disponible'}">Autor</strong></div>
            <div class="meta-item">Categoria:<strong th:text="${comic.categoria != null ? comic.categoria.descripcion : 'No disponible'}">Categoria</strong></div>
            <div class="meta-item">Estado editorial:<strong th:text="${comic.estado != null ? #strings.replace(comic.estado.name(), '_', ' ') : 'No definido'}">Estado</strong></div>
            <div class="meta-item">ID comic:<strong th:text="${comic.idComic}">0</strong></div>
        </div>
    </section>
</main>

<footer th:replace="~{components/client-layout :: footer}"></footer>
</body>
</html>
